<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Quiz: How well do you know me?</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <header>
        <h1>Love Quiz: How well do you know me?</h1>
        <p>Answer the questions about our relationship and see how well you know me! 💖</p>
    </header>

    <div id="quiz-container">
        <form id="quiz-form">
            <div class="question">
                <label for="question1">What is our favorite movie?</label>
                <input type="text" id="question1" required>
            </div>

            <div class="question">
                <label for="question2">Where did we go on our first date?</label>
                <input type="text" id="question2" required>
            </div>

            <div class="question">
                <label for="question3">What is my favorite color?</label>
                <input type="text" id="question3" required>
            </div>

            <button type="submit">Submit</button>
        </form>
        <div id="result" class="hidden">
            <h3>Your score: <span id="score"></span></h3>
            <p id="score-message"></p>
            <button onclick="window.location.reload()">Play again</button>
        </div>
    </div>

    <footer>
        <p>Enjoy! 💘</p>
    </footer>

    <script src="quiz.js"></script>
</body>
</html>
