<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olive Catcher 🫒</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --rose:#d94f7a;--rose-lt:#f7b8cc;--blush:#fff0f5;--deep:#7b1d42;
      --olive:#6b8c3a;--olive-lt:#a8c068;--card:rgba(255,255,255,0.82);
    }
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--blush);
      overflow:hidden;height:100vh;width:100vw;
      color:var(--deep);
    }
    .bg{
      position:fixed;inset:0;z-index:0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, #ffd6e7 0%,transparent 55%),
        radial-gradient(ellipse 60% 80% at 80% 90%, #ffc2d9 0%,transparent 50%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #fff0f5 0%,#ffe4ef 100%);
    }
    .bg::after{
      content:'';position:absolute;inset:0;
      background-image:radial-gradient(circle,rgba(217,79,122,0.05) 1px,transparent 1px);
      background-size:24px 24px;
    }
    #cursor{
      position:fixed;pointer-events:none;z-index:1000;
      transform:translate(-50%,-50%);font-size:2.2rem;
      filter:drop-shadow(0 3px 6px rgba(200,60,100,0.3));
      display:none;
    }
    canvas{position:fixed;inset:0;z-index:2;pointer-events:none;cursor:none;}

    .hud{
      position:fixed;top:0;left:0;right:0;z-index:10;
      display:flex;align-items:center;justify-content:space-between;
      padding:16px 28px;
      background:linear-gradient(to bottom,rgba(255,240,245,0.95),transparent);
    }
    .hud-score{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--rose);}
    .hud-score span{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;display:block;color:var(--rose-lt);}
    .hud-lives{font-size:1.4rem;letter-spacing:4px;}
    .hud-timer{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--deep);text-align:right;}
    .hud-timer span{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;display:block;color:var(--rose-lt);}

    /* warning flash */
    #flash{
      position:fixed;inset:0;z-index:50;pointer-events:none;
      background:rgba(180,50,50,0.25);
      opacity:0;transition:opacity 0.15s;
    }

    .overlay{
      position:fixed;inset:0;z-index:100;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(255,240,245,0.94);backdrop-filter:blur(12px);
      text-align:center;padding:32px;
    }
    .overlay.hidden{display:none;}
    .ov-emoji{font-size:4rem;margin-bottom:16px;}
    .olive-big{
      display:inline-block;width:4rem;height:5.2rem;
      background:radial-gradient(ellipse 60% 100% at 38% 28%,#6db33a 0%,#3d7018 50%,#2a4e10 100%);
      border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
      position:relative;box-shadow:2px 6px 14px rgba(0,0,0,0.3);
      margin-bottom:16px;
    }
    .olive-big::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:35%;height:25%;background:#7a2800;border-radius:50%;}
    .olive-big::before{content:'';position:absolute;top:16%;left:20%;width:22%;height:34%;background:rgba(160,230,80,0.42);border-radius:50%;transform:rotate(-20deg);}
    .ov-title{
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(2rem,6vw,3.2rem);font-weight:600;color:var(--deep);margin-bottom:10px;
    }
    .ov-title em{font-style:italic;color:var(--rose);}
    .ov-sub{font-size:0.9rem;font-weight:300;color:#a0506a;max-width:360px;line-height:1.7;margin-bottom:32px;}

    .btn-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
    .btn{
      padding:13px 28px;border-radius:999px;border:none;cursor:pointer;
      font-family:'DM Sans',sans-serif;font-size:0.85rem;letter-spacing:0.08em;
      text-transform:uppercase;text-decoration:none;display:inline-block;
      transition:transform 0.15s,box-shadow 0.15s;
    }
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,60,100,0.22);}
    .btn-primary{background:linear-gradient(135deg,var(--rose-lt),var(--rose));color:white;}
    .btn-secondary{background:white;border:2px solid var(--rose);color:var(--rose);}

    #quip{
      position:fixed;top:72px;left:50%;transform:translateX(-50%);
      font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-style:italic;
      color:var(--rose);z-index:20;pointer-events:none;
      opacity:0;transition:opacity 0.2s;white-space:nowrap;
    }

    .back{position:fixed;top:20px;left:20px;z-index:200;font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--rose);text-decoration:none;opacity:0.7;transition:opacity 0.2s;}
    .back:hover{opacity:1;}
  </style>
</head>
<body>
<div class="bg"></div>
<div id="cursor">🙅‍♀️</div>
<div id="flash"></div>
<canvas id="gc"></canvas>
<a href="index.html" class="back" id="back-lnk">← home</a>

<div class="hud">
  <div class="hud-score"><span>survived</span><span id="score-val">0s</span></div>
  <div class="hud-lives" id="lives-val">♥ ♥ ♥</div>
  <div class="hud-score" style="text-align:right"><span>dodged</span><span id="dodge-val">0</span></div>
</div>
<div id="quip"></div>

<!-- Start -->
<div class="overlay" id="ov-start">
  <div class="olive-big"></div>
  <h1 class="ov-title"><em>Dodge</em> the Olives!</h1>
  <p class="ov-sub">
    Olives are falling and they are DISGUSTING.<br/>
    Move to dodge them — don't let a single one touch you!<br/>
    Catching a 💕 heart gives you a shield.<br/>
    How long can you survive? 🤢
  </p>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="startGame()">I HATE OLIVES →</button>
    <a href="index.html" class="btn btn-secondary">← Back</a>
  </div>
</div>

<!-- End -->
<div class="overlay hidden" id="ov-end">
  <div class="ov-emoji" id="end-emoji">🥲</div>
  <h1 class="ov-title" id="end-title">Game Over</h1>
  <p class="ov-sub" id="end-sub"></p>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="startGame()">Try again →</button>
    <a href="index.html" class="btn btn-secondary">← Home</a>
  </div>
</div>

<script>
const QUIPS = [
  "EW get away!!","DISGUSTING 🤢","NOT THE OLIVES","I said NO!!",
  "THEY'RE EVERYWHERE","Why are there so many??","GROSS GROSS GROSS",
  "I would literally die","Naomi.exe has crashed","OLIVES = BANNED"
];

const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();addEventListener('resize',resize);

const cursorEl=document.getElementById('cursor');
let mx=W/2,my=H/2;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
document.addEventListener('touchmove',e=>{e.preventDefault();mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:false});

let olives=[],hearts=[],particles=[],lives=3,survived=0,dodged=0;
let raf,timerInt,running=false,shield=false,shieldTimer;

function startGame(){
  document.getElementById('ov-start').classList.add('hidden');
  document.getElementById('ov-end').classList.add('hidden');
  document.getElementById('back-lnk').style.display='none';
  document.getElementById('cursor').style.display='block';
  document.body.style.cursor='none';
  olives=[];hearts=[];particles=[];
  lives=3;survived=0;dodged=0;shield=false;
  mx=W/2;my=H/2;
  updateHUD();
  running=true;
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    survived++;
    document.getElementById('score-val').textContent=survived+'s';
  },1000);
  cancelAnimationFrame(raf);
  loop();
  spawnOlives();
  spawnHearts();
}

let oliveT,heartT;
function spawnOlives(){
  if(!running)return;
  const count=1+Math.floor(survived/8);
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      if(!running)return;
      olives.push({
        x:60+Math.random()*(W-120),y:-30,
        vx:(Math.random()-.5)*2,
        vy:2+Math.random()*3+survived*0.04,
        size:22+Math.random()*16,
        rot:Math.random()*Math.PI*2,
        rotSpd:(Math.random()-.5)*0.1,
        hit:false
      });
    },i*180);
  }
  oliveT=setTimeout(spawnOlives,Math.max(300,900-survived*10));
}
function spawnHearts(){
  if(!running)return;
  hearts.push({
    x:60+Math.random()*(W-120),y:-30,
    vy:1.5+Math.random()*1.5,
    size:26,wobble:Math.random()*Math.PI*2
  });
  heartT=setTimeout(spawnHearts,4000+Math.random()*3000);
}

function updateHUD(){
  document.getElementById('lives-val').textContent='♥'.repeat(lives)+'♡'.repeat(Math.max(0,3-lives));
  document.getElementById('dodge-val').textContent=dodged;
}

let quipTimer;
function showQuip(){
  const el=document.getElementById('quip');
  el.textContent=QUIPS[Math.floor(Math.random()*QUIPS.length)];
  el.style.opacity='1';
  clearTimeout(quipTimer);
  quipTimer=setTimeout(()=>el.style.opacity='0',1200);
}

function flash(){
  const f=document.getElementById('flash');
  f.style.opacity='1';
  setTimeout(()=>f.style.opacity='0',200);
}

function spawnParticles(x,y,type){
  const chars=type==='hit'?['🤢','💀','😱','☠️']:['💕','✨','🛡️','💖'];
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,
      life:1,decay:0.025+Math.random()*0.02,sz:18+Math.random()*10,
      ch:chars[Math.floor(Math.random()*chars.length)],g:0.1});
  }
}

const PLAYER_R=28;

function loop(){
  ctx.clearRect(0,0,W,H);
  cursorEl.style.left=mx+'px';cursorEl.style.top=my+'px';
  cursorEl.textContent=shield?'🛡️':'🙅‍♀️';

  // draw shield aura
  if(shield){
    ctx.save();
    ctx.globalAlpha=0.18+0.08*Math.sin(Date.now()*0.006);
    ctx.fillStyle='#f7b8cc';
    ctx.beginPath();ctx.arc(mx,my,PLAYER_R+18,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // olives
  olives.forEach(o=>{
    if(o.hit)return;
    o.y+=o.vy;o.x+=o.vx;o.rot+=o.rotSpd;
    // wall bounce
    if(o.x<30||o.x>W-30)o.vx*=-1;

    // hit check
    const dx=o.x-mx,dy=o.y-my,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<PLAYER_R+o.size/2){
      o.hit=true;
      spawnParticles(o.x,o.y,'hit');
      if(shield){
        shield=false;clearTimeout(shieldTimer);
        showQuip();
      } else {
        lives=Math.max(0,lives-1);
        updateHUD();flash();showQuip();
        if(lives<=0){endGame();return;}
      }
    }

    if(o.y>H+40){o.hit=true;dodged++;updateHUD();}

    ctx.save();
    ctx.translate(o.x,o.y);ctx.rotate(o.rot);
    // Draw olive as a proper shape (emoji unreliable on canvas)
    const r2=o.size/2;
    // olive body (dark green ellipse)
    ctx.beginPath();
    ctx.ellipse(0,0,r2*0.65,r2,0,0,Math.PI*2);
    ctx.fillStyle='#4a7a28';
    ctx.shadowColor='rgba(0,0,0,0.3)';
    ctx.shadowBlur=4;
    ctx.fill();
    // highlight
    ctx.beginPath();
    ctx.ellipse(-r2*0.18,-r2*0.25,r2*0.2,r2*0.35,0.3,0,Math.PI*2);
    ctx.fillStyle='rgba(120,200,60,0.45)';
    ctx.fill();
    // pit (red/brown center dot)
    ctx.beginPath();
    ctx.arc(0,0,r2*0.22,0,Math.PI*2);
    ctx.fillStyle='#8b3a1a';
    ctx.shadowBlur=0;
    ctx.fill();
    ctx.restore();
  });
  olives=olives.filter(o=>!o.hit);

  // hearts
  hearts.forEach(h=>{
    h.y+=h.vy;h.wobble+=0.05;
    const hx2=h.x+Math.sin(h.wobble)*6;
    const dx=hx2-mx,dy=h.y-my,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<PLAYER_R+h.size/2){
      spawnParticles(hx2,h.y,'heart');
      shield=true;
      clearTimeout(shieldTimer);
      shieldTimer=setTimeout(()=>shield=false,5000);
      h.y=H+100;
    }
    if(h.y>H+40)return;
    ctx.save();ctx.font=h.size+'px serif';ctx.textAlign='center';
    // gentle glow
    ctx.shadowColor='#f7b8cc';ctx.shadowBlur=10;
    ctx.fillText('💕',hx2,h.y);ctx.restore();
  });
  hearts=hearts.filter(h=>h.y<=H+60);

  // particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.life-=p.decay;
    ctx.save();ctx.globalAlpha=Math.max(0,p.life);
    ctx.font=p.sz+'px serif';ctx.textAlign='center';
    ctx.fillText(p.ch,p.x,p.y);ctx.restore();
  });

  if(running)raf=requestAnimationFrame(loop);
}

function endGame(){
  running=false;
  clearInterval(timerInt);
  clearTimeout(oliveT);clearTimeout(heartT);
  cancelAnimationFrame(raf);
  document.getElementById('cursor').style.display='none';
  document.body.style.cursor='';

  const ov=document.getElementById('ov-end');
  ov.classList.remove('hidden');
  document.getElementById('back-lnk').style.display='';

  let emoji,title,sub;
  if(survived>=60){emoji='🏆';title='OLIVE <em>Destroyer!</em>';sub=`${survived} seconds! ${dodged} olives dodged! Absolutely incredible — the olives fear you. 👑`;}
  else if(survived>=30){emoji='💪';title='Olive <em>Avoider!</em>';sub=`${survived}s survived, ${dodged} dodged! Not bad at all. Those olives stood no chance!`;}
  else if(survived>=15){emoji='😅';title='Close <em>enough!</em>';sub=`${survived}s and ${dodged} dodged — the olives got you eventually but you fought hard! 🤢`;}
  else{emoji='😭';title='The <em>Olives Won.</em>';sub=`Only ${survived}s... they got you quick. Revenge?`}

  document.getElementById('end-emoji').textContent=emoji;
  document.getElementById('end-title').innerHTML=title;
  document.getElementById('end-sub').textContent=sub;
}

document.addEventListener('touchstart',e=>{mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:true});
</script>
</body>
</html>
